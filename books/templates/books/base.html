{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}KitobDunyo{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d14;
    --cream: #faf7f2;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --rust: #b84c2b;
    --sage: #4a7c59;
    --card-bg: #ffffff;
    --border: #e8e2d9;
    --shadow: 0 20px 60px rgba(13,13,20,0.12);
    --shadow-hover: 0 40px 80px rgba(13,13,20,0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    height: 72px;
    background: rgba(250,247,242,0.88);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: all .3s;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--ink);
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }

  .nav-logo img {
    height: 48px;
    width: auto;
    object-fit: contain;
    transition: transform .3s ease;
  }
  .nav-logo:hover img { transform: scale(1.05); }

  .nav-logo span {
    background: linear-gradient(135deg, var(--gold), var(--rust));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-links { display: flex; gap: 8px; }

  .nav-btn {
    padding: 9px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-size: .875rem;
    font-weight: 500;
    transition: all .25s;
    letter-spacing: .2px;
  }

  .nav-btn.ghost {
    color: var(--ink);
    border: 1.5px solid transparent;
  }
  .nav-btn.ghost:hover {
    border-color: var(--border);
    background: white;
  }

  .nav-btn.filled {
    background: var(--ink);
    color: var(--cream);
    border: 1.5px solid var(--ink);
  }
  .nav-btn.filled:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 30px; right: 30px; z-index: 9999;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: .9rem;
    font-weight: 500;
    color: white;
    background: var(--ink);
    box-shadow: var(--shadow);
    transform: translateY(100px);
    opacity: 0;
    transition: all .4s cubic-bezier(.34,1.56,.64,1);
    max-width: 320px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--sage); }
  #toast.error { background: var(--rust); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(13,13,20,0.6);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 60px 120px rgba(0,0,0,.25);
    animation: modalIn .4s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes modalIn {
    from { transform: scale(.85) translateY(20px); opacity: 0; }
    to   { transform: scale(1)   translateY(0);    opacity: 1; }
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin-bottom: 28px;
    color: var(--ink);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid .full { grid-column: 1/-1; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-group label {
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: #888;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: .925rem;
    color: var(--ink);
    background: var(--cream);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.15);
    background: white;
  }

  .form-group textarea { resize: vertical; min-height: 90px; }

  .modal-actions {
    display: flex; gap: 12px; justify-content: flex-end;
    margin-top: 28px;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 50px;
    border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    transition: all .25s;
  }

  .btn-primary {
    background: var(--ink); color: white;
  }
  .btn-primary:hover {
    background: var(--gold); color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,168,76,.4);
  }

  .btn-secondary {
    background: transparent; color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--ink);
    background: var(--ink); color: white;
  }

  .btn-danger {
    background: var(--rust); color: white;
  }
  .btn-danger:hover {
    background: #9a3b22;
    transform: translateY(-2px);
  }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="{% static 'images/logo.svg' %}" alt="WIBE Logo">
  </a>
  <div class="nav-links">
    <a href="/" class="nav-btn ghost">Bosh sahifa</a>
  </div>
</nav>

{% block content %}{% endblock %}

<div id="toast"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3200);
}
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
